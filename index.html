<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <div class="main">
        <div class="sidebar">
            <div class="nav">
                <div class="nav-option" style="opacity: 1;">
                    <i class="fa-solid fa-house" style="color: rgb(255, 255, 255);"></i>
                    <a href="#">Home</a>
                </div>
                <div class="nav-option">
                    <i class="fa-solid fa-magnifying-glass" style="color: rgb(255, 255, 255);"></i>
                    <a href="#">Search</a>
                </div>
            </div>
            <div class="library">
                <div class="options">
                    <div class="lib-option nav-option ">
                        <img src="./assest/library_icon.png" alt="lib-icon">
                        <a href="#">Your Library</a>
                    </div>
                    <div class="icons">
                            <i class="fa-solid fa-plus" style="color: rgb(255, 255, 255);"></i>
                            <i class="fa-solid fa-arrow-down fa-rotate-270"></i>
                    </div>
                </div>
                <div class="lib-box">
                    <div class="box">
                        <p class="box-p1">Create your first playlist</p>
                        <p class="box-p2">It's easy, it will help you</p>
                        <button class="badge">Create Playlist</button>
                    </div>
                    <div class="box">
                        <p class="box-p1">Find some podcast to follow</p>
                        <p class="box-p2">We'll keep you upadated on new episode</p>
                        <button class="badge">Browse podcasts</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="main-content">main</div>
    <div class="music-player">mp</div>
    </div>
</body>

</html>
